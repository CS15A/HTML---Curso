<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 400px;
            height: 400px;
            border-collapse: collapse;
        }

        tr.linha {
            background-color: gray;
        }

        td {
            border: 1px solid black;
            padding: 8px;
            /*Alinhamento horizontal*/
            text-align: center;
            /*
            Alinhamento vertical: top/middle/bottom
            */
            vertical-align: bottom;
        }

        .numero {
            text-align: right;
        }

        td.dado {
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <!--
    Hierarquia de Tabelas(simples)
    Table = tabela
        Table row(tr) = linha de tabela
            Table header = cabeçalho
            Table data(td) = dado da tabela
    -->
    <table>
        <!--Primeira linha-->
        <tr>
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <!--Segunda linha-->
        <tr class="linha">
           <td>A2</td>
           <td>B2</td>
           <td class="numero">C2</td> 
        </tr>
        <!--Terceira linha-->
        <tr>
           <td>A3</td>
           <td>B3</td>
           <td class="numero">C3</td> 
        </tr>
        <!--Quarta linha-->
        <tr>
           <td>A4</td>
           <td>B4</td>
           <td class="dado">C4</td> 
        </tr>
        <tr>
            <td>A5</td>
            <td>B5</td>
        </tr>
        <tr>
            <td>A6</td>
        </tr>
    </table>
</body>
</html>
