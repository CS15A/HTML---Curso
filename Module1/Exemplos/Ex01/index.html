<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UFT-8">
        <meta name="viewport" content="width-device-width, initial-scale=1.0">
        <title>Parágrafos</title>
    </head>
    <body>
        <h1>Parágrafos e Quebras de linha</h1>
        <hr>
        <p>Você pode escrever parágrafo de qualquer jeito. Basta colocar tudo entre &lt;p&gt; e &lt;/p&gt;</p>
        <p>Se preicsar quebrar o texto em algum lugar específico <br> como esse, você pode usar a tag &lt;br&gt;</p>
        <p>
            Vamos adicionar símbolos especiais: 
            &reg;
            &copy; 
            &trade;
            &euro; 
            &pound;
            &yen;
            &cent;
            &delta;
            &Delta;
            &uparrow;
        </p>
        <p>
            <!--Procurar unicode no emojipedia-->
            Vamos adicionar emojis:
            &#x1F596;
        </p>
    </body>
</html>
