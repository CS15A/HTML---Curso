<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UFT-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Vídeos em HTML5</title>
    </head>
    <body>
        <h1>Inserindo vídeos hospedados localmente</h1>
        <p>Este vídeo está hospedado no meu próprio servidor</p>
        <!--poster="colocar imagem antes de clicar o vídeo"-->
        <video src="midia/video.mp4" width="500" poster="imagens/limoes-capa.png" controls autoplay loop></video>
        <video width="500" controls>
            <source src="midia/video.mp4" type="video/mp4">
            <p>Seu navegador não tem compatibilidade com reprodução de vídeos</p>
        </video>
        <h1>Inserindo vídeos do youtube</h1>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/WO8kTGKtmyc?si=2Zfof_uyQe55Ho40&amp;start=3" 
        title="YouTube video player" frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </body>
</html>
