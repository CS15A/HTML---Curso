<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--dafont.com-->
    <title>Fonte Externas</title>
    <style>
        @font-face {
            font-family: 'Love Boho';
            /*
            Tipos de format()
            - opentype(otf)
            - truetype(ttf)
            - embedded-opentype
            - truetype-aat (Apple Advanced Typography)
            - svf
            */
            src: url('../fonts/Love Boho.otf') format('opentype'), url('../fonts/Love Boho.otf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 { 
            font-family: 'Love Boho', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Voluptate earum perspiciatis voluptates nihil, rem, facere qui, sequi eos deleniti ducimus esse laudantium aliquam a quisquam laborum delectus! Esse, est soluta.</p>
</body>
</html>
