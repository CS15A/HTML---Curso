<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        /*box-level*/
        h1 {
            background-color: lightgray;
            height: 300px;
            width: 300px;

            border-width: 10px;
            border-style: solid;
            border-color: darkgray;
            /*
            short-hand
            border: width style color;
            Ex: border: 10px solid darkgray;
            */

            padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px;
            /*
            padding: 10px 10px 10px 10px
            padding: 10px; (todos lados iguais)
            */

            margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 10px;
            margin-left: 10px;
            /*margin: top right bottom left*/

            /*
            como centralizar uma caixa?
            margin:auto;
            */

            outline-width: 5px;
            outline-style: dashed;
            outline-color: salmon;
        }

        /*inline-level*/
        a {
            border-width: 10px;
            /*solid/douted/double/groove(margem 3D)*/
            border-style: double;
            border-color: red;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>
        Parágrafos também são exemplos de box-level, mas os
        <a href="#">lnks são exemplos de caixas inline-level</a>.
        Vamos ver como tudo isso funciona.
    </p>
</body>
</html>
